<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rostisseria Milenium</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="contenedor">

    <h1> Rostisseria Milenium</h1>

    <!-- STOCK -->

    <div class="caja">

        <h2>Stock inicial</h2>

        <div class="filaStock">

            <input
                id="stockInicial"
                type="number"
                placeholder="Ejemplo: 100">

            <button onclick="iniciarStock()">
                INICIAR
            </button>

        </div>

        <div class="filaAñadir">

            <input
                id="stockExtra"
                type="number"
                placeholder="+">

            <button onclick="añadirStock()">
                Añadir
            </button>

        </div>

    </div>

    <!-- QUEDAN -->

    <div class="caja">

        <h2>QUEDAN</h2>

        <div id="quedan">
            0
        </div>

        <div class="ventas">

            <p>
                🔴 Sin encargo:
                <span id="sinEncargo">0</span>
            </p>

            <p>
                🟠 Con encargo:
                <span id="conEncargo">0</span>
            </p>

        </div>

    </div>

    <!-- VENTA -->
    <section class="packs">

    <button onclick="pack1()">
        📦 PACK 1
        <br>
        <small>1/2 Pollo + 1/2 Caliu</small>
    </button>

    <button onclick="pack2()">
        📦 PACK 2
        <br>
        <small>Pollo + Pan + Patatas</small>
    </button>

    <button onclick="pack3()">
        📦 PACK 3
        <br>
        <small>Pollo + Pan + Patatas + Canelón</small>
    </button>

        <div id="selectorPatatas" class="selectorPatatas" style="display:none;">

    <h3>Elige las patatas</h3>

    <div class="patatasFila">

        <button onclick="seleccionarPatata('caliu')">
            🥔 Caliu
        </button>

        <button onclick="seleccionarPatata('bravas')">
            🍟 Bravas
        </button>

        <button onclick="seleccionarPatata('fritas')">
            🍟 Fritas
        </button>

    </div>

</div>
</section>

    <div class="caja">

        <h2>Venta</h2>

        
        <input
            id="cantidadVenta"
            type="number"
            value="1"
            min="1">

        <div class="radio">

            <label>

                <input
                    type="radio"
                    name="tipo"
                    value="1"
                    checked>

                1 Pollo

            </label>

            <label>

                <input
                    type="radio"
                    name="tipo"
                    value="0.5">

                1/2 Pollo

            </label>

        </div>

        <button
            class="rojo"
            onclick="vender(false)">

            SIN ENCARGO

        </button>

        <button
            class="naranja"
            onclick="vender(true)">

            CON ENCARGO

        </button>

    </div>

    <!-- PRODUCCIÓN -->

    <div class="caja">

        <h2>Producción</h2>

        <div id="productos">

        </div>

    </div>

    <!-- BOTONES -->

    <div class="botones">

        <button onclick="deshacer()">
            ↩ Deshacer
        </button>

        <button onclick="reiniciar()">
            🔄 Reiniciar día
        </button>

    </div>

</div>

<script src="app.js"></script>

</body>

</html>
