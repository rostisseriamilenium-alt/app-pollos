<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rostisseria Milenium</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="contenedor">

    <h1> Rostisseria Milenium</h1>

    <!-- STOCK -->

    <div class="caja">

        <h2>Stock inicial</h2>

        <div class="filaStock">

            <input
                id="stockInicial"
                type="number"
                placeholder="Ejemplo: 100">

            <button onclick="iniciarStock()">
                INICIAR
            </button>

        </div>

        <div class="filaAñadir">

            <input
                id="stockExtra"
                type="number"
                placeholder="+">

            <button onclick="añadirStock()">
                Añadir
            </button>

        </div>

    </div>

    <!-- QUEDAN -->

    <div class="caja">

        <h2>QUEDAN</h2>

        <div id="quedan">
            0
        </div>

        <div class="ventas">

            <p>
                🔴 Sin encargo:
                <span id="sinEncargo">0</span>
            </p>

            <p>
                🟠 Con encargo:
                <span id="conEncargo">0</span>
            </p>

        </div>

    </div>

    <!-- VENTA -->

        <h2>Venta</h2>

        
        <input
            id="cantidadVenta"
            type="number"
            value="1"
            min="1">

        <div class="radio">

            <label>

                <input
                    type="radio"
                    name="tipo"
                    value="1"
                    checked>

                1 Pollo

            </label>

            <label>

                <input
                    type="radio"
                    name="tipo"
                    value="0.5">

                1/2 Pollo

            </label>

        </div>

        <button
            class="rojo"
            onclick="vender(false)">

            SIN ENCARGO

        </button>

        <button
            class="naranja"
            onclick="vender(true)">

            CON ENCARGO

        </button>

    </div><section class="packs">

    <h2>📦 Packs SIN ENCARGO</h2>

    <div class="filaPacks">
 
        <button onclick="pack2(false)">📦 Pack 2</button>
        <button onclick="pack3(false)">📦 Pack 3</button>
        <button onclick="pack1(false)">📦 Pack 1</button>
    </div>

    <h2>📞 Packs CON ENCARGO</h2>

    <div class="filaPacks">

        <button onclick="pack2(true)">📦 Pack 2</button>
        <button onclick="pack3(true)">📦 Pack 3</button>
        <button onclick="pack1(true)">📦 Pack 1</button>
    </div>

</section>

<div id="selectorPatatas" class="selectorPatatas" style="display:none;">

    <h3>Elige las patatas</h3>

    <div class="patatasFila">

        <button onclick="seleccionarPatata('caliu')">🥔 Caliu</button>

        <button onclick="seleccionarPatata('bravas')">🍟 Bravas</button>

        <button onclick="seleccionarPatata('fritas')">🍟 Fritas</button>

    </div>

</div>
</section>

    <div class="caja">

    <!-- PRODUCCIÓN -->

    <div class="caja">

        <h2>Producción</h2>

        <div id="productos">

        </div>

    </div>

    <!-- BOTONES -->

    <div class="botones">

        <button onclick="deshacer()">
            ↩ Deshacer
        </button>

        <button onclick="reiniciar()">
            🔄 Reiniciar día
        </button>

    </div>

</div>

<script src="app.js"></script>

</body>

</html>
